ai_usage_summary: |
Used Anthropic Claude and ChatGPT during development for debugging,
code review, documentation assistance, and idea validation.
Final implementation, testing, ranking logic, repository setup,
and submission preparation were completed manually.

methodology_summary: |
Built a candidate ranking system using profile information,
skills, years of experience, career history, and recruiter
engagement signals. Relevant AI/ML skills, retrieval and
ranking experience, career-history keywords, GitHub activity,
recruiter response rate, recruiter saves, notice period,
and relocation preference were used to generate a ranking score.
Candidates were sorted by score and the top 100 profiles were selected.
A candidate-specific reasoning statement was generated for each recommendation.

